server:
  port: 8080

spring:
  application:
    name: booth-rental
  datasource:
    url: jdbc:mysql://localhost:3306/booth_rental?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    default-property-inclusion: non_null
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 333536955251-7b8f3bi4bndisidqdtno97jjuvedbibv.apps.googleusercontent.com
            client-secret: ${GOOGLE_CLIENT_SECRET:your_google_secret}
            scope:
              - email
              - profile
          facebook:
            client-id: 1046456284400215
            client-secret: ${FACEBOOK_CLIENT_SECRET:your_facebook_secret}
            scope:
              - email
              - public_profile
  mail:
    host: smtp.gmail.com
    port: 587
    username: nguyendangquang0510@gmail.com
    password: ${MAIL_PASSWORD:your_mail_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:defaultSecretKey123!@#defaultSecretKey123!@#}
    expiration-ms: 86400000  # 24 hours

  # CORS Configuration
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:5178
